<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#060810" />
    <meta name="description" content="VulnScan — Professional Security Intelligence Platform. Scan websites for vulnerabilities instantly." />
    <title>VulnScan — Security Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body { background: #060810; color: #e2e4f0; font-family: 'Outfit', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: #0d101c; }
      ::-webkit-scrollbar-thumb { background: #1e2340; border-radius: 999px; }
    </style>
  </head>
